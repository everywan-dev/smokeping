<!doctype html>
<html lang="en">

<head>
  <title>SmokePing Latency Page for <##display_name##>
  </title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Configurable Font URL -->
  <link href="{{SMOKEPING_FONT_URL}}" rel="stylesheet">

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="/smokeping/css/style.css">
  <link rel="stylesheet" href="/smokeping/css/h2-fix.css">

  <!-- Dynamic Colors will be injected here by init script -->

  <script src="/smokeping/js/traceping.js" defer></script>
</head>

<body>
  <div class="wrapper d-flex align-items-stretch">
    <nav id="sidebar">
      <div class="custom-menu">
        <button type="button" id="sidebarCollapse" class="btn btn-primary">
          <i class="fa fa-bars"></i>
          <span class="sr-only">Toggle Menu</span>
        </button>
      </div>
      <div class="p-4 pt-5">
        <h1><a href="/smokeping/smokeping.cgi" class="logo"><img src="{{SMOKEPING_LOGO_URL}}"
              style="max-width:80%; height:auto;" alt="Logo"></a></h1>
        <ul class="list-unstyled components mb-5">
          <##menu##>
        </ul>

        <div class="footer">
          <p>
            Maintained by<br>
            <a href="#">{{SMOKEPING_OWNER_NAME}}</a>
          </p>
          <p>
            Running on <a href="https://oss.oetiker.ch/smokeping/">SmokePing 2.9.0</a> by<br>
            Tobi Oetiker and Niko Tyni Copyright &copy;2026<br>
            {{BRAND_FOOTER}}
          </p>
        </div>

      </div>
    </nav>

    <!-- Page Content  -->
    <div id="content" class="p-4 p-md-5 pt-5">
      <h2 class="mb-4">
        <##title##>
      </h2>
      <p>
        <##remark##>
      </p>
      <P>
      <div class="body">
        <##body##>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
  <script src="/smokeping/js/main.js"></script>
</body>

</html>
