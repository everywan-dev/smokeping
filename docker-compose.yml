services:
  smokeping:
    image: sistemasminorisa/smokeping:latest
    container_name: smokeping
    hostname: ${SMOKEPING_HOSTNAME:-smokeping-master}
    ports:
      - "${SMOKEPING_INTERNAL_PORT:-8081}:80"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    env_file:
      - .env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - ./config:/config
      - ./data:/data
      - ./logs:/logs
    restart: unless-stopped
    networks:
      - smokeping-net

  nginx:
    image: nginx:alpine
    container_name: smokeping-nginx
    ports:
      - "${PORT:-8085}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - smokeping
    restart: unless-stopped
    networks:
      - smokeping-net

networks:
  smokeping-net:
    driver: bridge
