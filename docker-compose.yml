version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_API_EMAIL=${ACME_EMAIL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik-data/acme.json:/acme.json
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/acme.json"
    networks:
      - smokeping-net

  smokeping:
    image: sistemasminorisa/smokeping:latest
    container_name: smokeping
    hostname: ${SMOKEPING_HOSTNAME:-smokeping-master}
    environment:
      # --- System ---
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Madrid}
      
      # --- Site Identity ---
      - SMOKEPING_OWNER=${SMOKEPING_OWNER:-SmokePing Admin}
      - SMOKEPING_CONTACT=${SMOKEPING_CONTACT:-admin@example.com}
      - SMOKEPING_HOSTNAME=${SMOKEPING_HOSTNAME:-smokeping-master}
      - SMOKEPING_TITLE=${SMOKEPING_TITLE:-Network Monitor}
      
      # --- Branding ---
      - SMOKEPING_BRAND_NAME=${SMOKEPING_BRAND_NAME:-}
      - SMOKEPING_BRAND_URL=${SMOKEPING_BRAND_URL:-}
      - SMOKEPING_LOGO_URL=${SMOKEPING_LOGO_URL:-images/logo.svg}
      
      # --- Colors ---
      - SMOKEPING_COLOR_PRIMARY=${SMOKEPING_COLOR_PRIMARY:-#007bff}
      - SMOKEPING_COLOR_SECONDARY=${SMOKEPING_COLOR_SECONDARY:-#6c757d}
      - SMOKEPING_COLOR_ACCENT=${SMOKEPING_COLOR_ACCENT:-#00d4ff}
      - SMOKEPING_COLOR_SIDEBAR_BG=${SMOKEPING_COLOR_SIDEBAR_BG:-#1a1a2e}
      - SMOKEPING_COLOR_SIDEBAR_TEXT=${SMOKEPING_COLOR_SIDEBAR_TEXT:-rgba(255,255,255,0.8)}
      - SMOKEPING_COLOR_HEADER_BG=${SMOKEPING_COLOR_HEADER_BG:-#16213e}
      
      # --- Traceroute ---
      - TRACEPING_INTERVAL=${TRACEPING_INTERVAL:-300}
      - TRACEPING_RETENTION_DAYS=${TRACEPING_RETENTION_DAYS:-365}
      - TRACEPING_PORT=${TRACEPING_PORT:-9000}

    cap_add:
      - NET_RAW
      - NET_ADMIN
    
    volumes:
      - ./config:/config
      - ./data:/data
      - ./logs:/logs
    
    restart: unless-stopped
    networks:
      - smokeping-net
    
    labels:
      - "traefik.enable=true"
      # Router 1: Web Interface
      - "traefik.http.routers.smokeping-web.rule=Host(`${DOMAIN}`) && !Path(`/smokeping/traceping.cgi`)"
      - "traefik.http.routers.smokeping-web.entrypoints=websecure"
      - "traefik.http.routers.smokeping-web.tls=true"
      - "traefik.http.routers.smokeping-web.tls.certresolver=le"
      - "traefik.http.services.smokeping-web.loadbalancer.server.port=80"
      
      # Middleware
      - "traefik.http.middlewares.add-slash.redirectregex.regex=^https?://([^/]+)/smokeping$$"
      - "traefik.http.middlewares.add-slash.redirectregex.replacement=https://$${1}/smokeping/"
      - "traefik.http.routers.smokeping-web.middlewares=add-slash"

      # Router 2: Traceroute Backend
      - "traefik.http.routers.smokeping-trace.rule=Host(`${DOMAIN}`) && Path(`/smokeping/traceping.cgi`)"
      - "traefik.http.routers.smokeping-trace.entrypoints=websecure"
      - "traefik.http.routers.smokeping-trace.tls=true"
      - "traefik.http.routers.smokeping-trace.tls.certresolver=le"
      - "traefik.http.services.smokeping-trace.loadbalancer.server.port=9000"

networks:
  smokeping-net:
    driver: bridge
