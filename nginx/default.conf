upstream smokeping_backend {
    server smokeping:80;
}

upstream traceping_backend {
    server smokeping:9000;
}

server {
    listen 80;
    server_name _;

    # Importante: reescribir redirects de Apache para usar el host correcto
    proxy_redirect http://localhost/ $scheme://$http_host/;
    proxy_redirect http://localhost:80/ $scheme://$http_host/;

    # Proxy para SmokePing normal
    location / {
        proxy_pass http://smokeping_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # TracePing CGI - usar servidor Perl dedicado
    location = /smokeping/traceping.cgi {
        proxy_pass http://traceping_backend/traceping.cgi;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Reescribir /smokeping a /smokeping/ para evitar redirect a producción
    location = /smokeping {
        return 301 $scheme://$http_host/smokeping/;
    }
}
